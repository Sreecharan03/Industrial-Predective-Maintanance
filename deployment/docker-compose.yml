# SenseMinds 360 - local production stack.
# Usage (from deployment/):  docker compose up --build
#   dev tools:               docker compose --profile dev up
# Provide secrets via a .env file next to this compose (see .env.example).

x-app-env: &app-env
  SENSEMINDS_ENVIRONMENT: ${SENSEMINDS_ENVIRONMENT:-prod}
  SENSEMINDS_LOG_LEVEL: ${SENSEMINDS_LOG_LEVEL:-INFO}
  SENSEMINDS_DATABASE_URL: postgresql+psycopg://senseminds:${POSTGRES_PASSWORD:-senseminds}@postgres:5432/senseminds
  SENSEMINDS_ARTIFACT_ROOT: /data/artifacts
  SENSEMINDS_LEGACY_REPORTS_ROOT: /data/datasets
  SENSEMINDS_JWT_SECRET: ${SENSEMINDS_JWT_SECRET:-dev-insecure-change-me}
  SENSEMINDS_DEFAULT_ADMIN_PASSWORD: ${SENSEMINDS_DEFAULT_ADMIN_PASSWORD:-admin}
  SENSEMINDS_GROQ_API_KEY: ${SENSEMINDS_GROQ_API_KEY:-}
  SENSEMINDS_LLM_MODEL: ${SENSEMINDS_LLM_MODEL:-llama-3.3-70b-versatile}
  # Escalation email (values live in the gitignored .env; empty = alerts are
  # still recorded, just marked 'skipped' instead of emailed).
  SENSEMINDS_SMTP_HOST: ${SENSEMINDS_SMTP_HOST:-}
  SENSEMINDS_SMTP_PORT: ${SENSEMINDS_SMTP_PORT:-587}
  SENSEMINDS_SMTP_USER: ${SENSEMINDS_SMTP_USER:-}
  SENSEMINDS_SMTP_PASSWORD: ${SENSEMINDS_SMTP_PASSWORD:-}
  SENSEMINDS_SMTP_STARTTLS: ${SENSEMINDS_SMTP_STARTTLS:-true}
  SENSEMINDS_MAIL_FROM: ${SENSEMINDS_MAIL_FROM:-}
  SENSEMINDS_MAIL_TO: ${SENSEMINDS_MAIL_TO:-}
  SENSEMINDS_ALERT_REMINDER_MINUTES: ${SENSEMINDS_ALERT_REMINDER_MINUTES:-30}
  SENSEMINDS_ALERT_COOLDOWN_MINUTES: ${SENSEMINDS_ALERT_COOLDOWN_MINUTES:-15}
  SENSEMINDS_DASHBOARD_URL: ${SENSEMINDS_DASHBOARD_URL:-http://localhost:3000}

services:
  postgres:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: senseminds
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senseminds}
      POSTGRES_DB: senseminds
    volumes:
      - ${SM_DATA:-../../senseminds-data}/pgdata:/var/lib/postgresql/data
    networks: [smnet]
    healthcheck:
      # -h 127.0.0.1 forces a TCP check. Without it pg_isready passes against the
      # temporary socket-only server initdb runs on first boot, and dependents
      # connect before Postgres is really listening.
      test: ["CMD-SHELL", "pg_isready -U senseminds -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  migrate:
    build: { context: .., dockerfile: Dockerfile }
    command: ["python", "-m", "senseminds.infrastructure.db.migrate"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
    networks: [smnet]
    restart: "no"

  api:
    restart: unless-stopped
    build: { context: .., dockerfile: Dockerfile }
    command: ["uvicorn", "senseminds.api.asgi:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    ports: ["8000:8000"]
    volumes:
      - ${SM_DATA:-../../senseminds-data}/artifacts:/data/artifacts
      - ${SM_DATASETS:-../../Datasets}:/data/datasets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [smnet]

  # Batch mode: loads the REAL historical CSVs and analyses on an interval.
  # Mutually exclusive with `simulator`.  docker compose --profile batch up -d worker
  worker:
    restart: unless-stopped
    profiles: ["batch"]
    build: { context: .., dockerfile: Dockerfile }
    command: ["python", "-m", "senseminds.workers.analysis_worker"]
    environment:
      <<: *app-env
      SENSEMINDS_WORKER_INTERVAL_SECONDS: ${SENSEMINDS_WORKER_INTERVAL_SECONDS:-300}
      SENSEMINDS_BOOTSTRAP_ON_START: ${SENSEMINDS_BOOTSTRAP_ON_START:-true}
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    volumes:
      - ${SM_DATA:-../../senseminds-data}/artifacts:/data/artifacts
      - ${SM_DATASETS:-../../Datasets}:/data/datasets:ro
    networks: [smnet]

  # Live machine simulator — generates 30-second data for all 6 machines, tails it
  # just after each tick, ingests + re-analyses. Opt-in:
  #   docker compose --profile sim up -d simulator      (stop `worker` first)
  simulator:
    build: { context: .., dockerfile: Dockerfile }
    command: ["python", "-m", "senseminds.simulation.main"]
    profiles: ["sim"]
    environment:
      <<: *app-env
      SENSEMINDS_LIVE_DATA_ROOT: /data/live
      SENSEMINDS_SIM_BACKFILL_DAYS: ${SENSEMINDS_SIM_BACKFILL_DAYS:-3}
      SENSEMINDS_SIM_RESET: ${SENSEMINDS_SIM_RESET:-false}
      SENSEMINDS_SIM_DRIFT_UNIT: ${SENSEMINDS_SIM_DRIFT_UNIT:-SC-126}
      SENSEMINDS_SIM_DRIFT_COLUMN: ${SENSEMINDS_SIM_DRIFT_COLUMN:-Discharge Pressure}
      SENSEMINDS_SIM_DRIFT_RAMP_MINUTES: ${SENSEMINDS_SIM_DRIFT_RAMP_MINUTES:-20}
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    volumes:
      - ${SM_DATA:-../../senseminds-data}/artifacts:/data/artifacts
      - ${SM_DATASETS:-../../Datasets}:/data/datasets:ro
      - ${SM_DATA:-../../senseminds-data}/live:/data/live
    networks: [smnet]

  dashboard:
    restart: unless-stopped
    build: { context: ../frontend, dockerfile: Dockerfile }
    depends_on:
      api: { condition: service_started }
    ports: ["3000:80"]
    networks: [smnet]

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@senseminds.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports: ["5050:80"]
    depends_on: [postgres]
    networks: [smnet]

networks:
  smnet: { driver: bridge }
