server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hashed build assets are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # The API lives behind the same origin, so the SPA needs no CORS.
  location /api/ {
    # Resolve the API's address at REQUEST time, not once at startup. nginx caches
    # the upstream IP from config-load, so redeploying the api container (which gives
    # it a new IP) would leave nginx proxying to a dead address and returning 502
    # until the dashboard was also restarted. 127.0.0.11 is Docker's embedded DNS.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_api api:8000;
    proxy_pass http://$upstream_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;   # grounded LLM answers can take a moment
  }

  location = /health { proxy_pass http://api:8000/health; }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
